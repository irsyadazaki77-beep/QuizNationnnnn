<!DOCTYPE html>
<html lang="id">

<head>
    <meta name="theme-color" content="#0a1120" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Nouns & Pronouns — QuizNation</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&display=swap"
        rel="stylesheet">
    <style>
        /* Mobile Optimization */
        html, body { max-width: 100%; overflow-x: hidden; }
        * { -webkit-tap-highlight-color: transparent !important; }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f8f7f4;
            --surface: #ffffff;
            --surface2: #f1f0ea;
            --border: #e8e6dd;
            --text: #1c1a17;
            --text2: #5c5848;
            --text3: #9c9880;
            --ink: #1c1a17;

            --accent: #b45309;
            --accent-mid: #d97706;
            --accent-light: #fef3c7;
            --accent-glow: rgba(180, 83, 9, 0.1);

            --rose: #9f1239;
            --rose-light: #ffe4e6;
            --teal: #0f766e;
            --teal-light: #ccfbf1;
            --indigo: #3730a3;
            --indigo-light: #e0e7ff;
            --slate: #334155;
            --slate-light: #f1f5f9;
            --orange: #c2410c;
            --orange-light: #ffedd5;
            --emerald: #065f46;
            --emerald-light: #d1fae5;

            --sidebar-w: 260px;
            --r: 20px;
            --r-sm: 12px;
            --shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 40px rgba(0, 0, 0, 0.09);
        }

        body.dark {
            --bg: #100f0c;
            --surface: #18170e;
            --surface2: #211f14;
            --border: #2c2a1e;
            --text: #f2f0e8;
            --text2: #a8a488;
            --text3: #6a6650;
            --ink: #f2f0e8;
            --accent-light: rgba(180, 83, 9, 0.18);
            --rose-light: rgba(159, 18, 57, 0.18);
            --teal-light: rgba(15, 118, 110, 0.18);
            --indigo-light: rgba(30, 58, 138, 0.18);
            --slate-light: rgba(51, 65, 85, 0.25);
            --orange-light: rgba(194, 65, 12, 0.18);
            --emerald-light: rgba(6, 95, 70, 0.18);
            --shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 8px 40px rgba(0, 0, 0, 0.55);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            transition: background 0.4s, color 0.4s;
            overflow-x: hidden;
        }

        /* -- Sidebar -- */
        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .backdrop.open {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            z-index: 100;
            padding: 28px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media(min-width:1024px) {
            .sidebar {
                transform: translateX(0);
            }
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .logo {
            font-family: 'Fraunces', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 28px;
            padding: 0 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-close {
            display: none;
            background: none;
            border: none;
            color: var(--text2);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            line-height: 1;
        }

        @media(max-width:1023px) {
            .logo-close {
                display: block;
            }
        }

        .nav-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text3);
            padding: 16px 12px 6px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--r-sm);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text2);
            transition: 0.15s;
        }

        .nav-link:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-link.active {
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 700;
        }

        .hamburger {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 110;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text);
            box-shadow: var(--shadow);
        }

        @media(max-width:1023px) {
            .hamburger {
                display: flex;
            }
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 110;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: var(--shadow);
            transition: 0.3s;
        }

        .main {
            flex: 1;
            margin-left: 0;
            transition: margin 0.4s;
            min-width: 0;
        }

        @media(min-width:1024px) {
            .main {
                margin-left: var(--sidebar-w);
            }
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--rose));
            z-index: 200;
            transition: width 0.15s;
            border-radius: 0 2px 2px 0;
        }

        /* -- Hero -- */
        .hero {
            padding: 80px 48px 56px;
            max-width: 840px;
            margin: 0 auto;
            opacity: 0;
            animation: rise 0.7s 0.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @media(max-width:768px) {
            .hero {
                padding: 72px 24px 40px;
            }
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text3);
            margin-bottom: 28px;
            font-weight: 500;
        }

        .breadcrumb span {
            color: var(--text2);
        }

        .module-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 100px;
            background: var(--accent-light);
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 20px;
            border: 1px solid rgba(180, 83, 9, 0.18);
        }

        .hero h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(2.2rem, 5vw, 3.4rem);
            font-weight: 700;
            line-height: 1.1;
            color: var(--text);
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--accent);
        }

        .hero p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text2);
            max-width: 560px;
        }

        .hero-stats {
            display: flex;
            gap: 20px;
            margin-top: 36px;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text2);
            font-weight: 500;
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }

        /* -- Content -- */
        .content {
            max-width: 840px;
            margin: 0 auto;
            padding: 0 48px 100px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        @media(max-width:768px) {
            .content {
                padding: 0 20px 80px;
            }
        }

        /* -- Cards -- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 36px;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(24px);
            transition: box-shadow 0.3s, transform 0.3s;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        @media(max-width:768px) {
            .card {
                padding: 24px;
            }
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .card-title {
            font-family: 'Fraunces', serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .card-subtitle {
            font-size: 0.82rem;
            color: var(--text3);
            margin-top: 2px;
            font-weight: 500;
        }

        .body-text {
            font-size: 0.97rem;
            line-height: 1.8;
            color: var(--text2);
            margin-bottom: 24px;
        }

        .body-text strong {
            color: var(--text);
            font-weight: 700;
        }

        /* -- Lists & Grids -- */
        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .modal-item {
            border-radius: 16px;
            padding: 20px;
            border: 1.5px solid transparent;
            cursor: default;
            transition: 0.25s;
        }

        .modal-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .mi-word {
            font-family: 'Fraunces', serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .mi-function {
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 10px;
        }

        .mi-desc {
            font-size: 0.83rem;
            line-height: 1.55;
            color: var(--text2);
            margin-bottom: 10px;
        }

        .mi-ex {
            font-size: 0.8rem;
            font-style: italic;
        }

        .mi-ability {
            background: var(--teal-light);
            border-color: rgba(15, 118, 110, 0.2);
        }

        .mi-ability .mi-word,
        .mi-ability .mi-function {
            color: var(--teal);
        }

        .mi-ability .mi-ex {
            color: var(--teal);
        }

        .mi-permission {
            background: var(--indigo-light);
            border-color: rgba(30, 58, 138, 0.2);
        }

        .mi-permission .mi-word,
        .mi-permission .mi-function {
            color: var(--indigo);
        }

        .mi-permission .mi-ex {
            color: var(--indigo);
        }

        .mi-obligation {
            background: var(--rose-light);
            border-color: rgba(159, 18, 57, 0.2);
        }

        .mi-obligation .mi-word,
        .mi-obligation .mi-function {
            color: var(--rose);
        }

        .mi-obligation .mi-ex {
            color: var(--rose);
        }

        .mi-possibility {
            background: var(--orange-light);
            border-color: rgba(194, 65, 12, 0.2);
        }

        .mi-possibility .mi-word,
        .mi-possibility .mi-function {
            color: var(--orange);
        }

        .mi-possibility .mi-ex {
            color: var(--orange);
        }

        /* -- Formula Strip -- */
        .formula-strip {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 16px;
        }

        .formula-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text3);
            margin-bottom: 12px;
        }

        .formula-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .f-chip {
            padding: 8px 16px;
            border-radius: 9px;
            font-weight: 700;
            font-size: 0.85rem;
            border: 1.5px solid transparent;
            cursor: default;
            transition: transform 0.2s;
            font-family: monospace;
        }

        .f-chip:hover {
            transform: translateY(-2px);
        }

        .f-chip.mod {
            background: var(--accent-light);
            color: var(--accent);
            border-color: rgba(180, 83, 9, 0.2);
        }

        .f-chip.sub {
            background: var(--teal-light);
            color: var(--teal);
            border-color: rgba(15, 118, 110, 0.2);
        }

        .f-chip.vrb {
            background: var(--rose-light);
            color: var(--rose);
            border-color: rgba(159, 18, 57, 0.2);
        }

        .f-chip.obj {
            background: var(--emerald-light);
            color: var(--emerald);
            border-color: rgba(6, 95, 70, 0.2);
        }

        .f-chip.cnd {
            background: var(--indigo-light);
            color: var(--indigo);
            border-color: rgba(30, 58, 138, 0.2);
        }

        .f-chip.neu {
            background: var(--surface);
            color: var(--text2);
            border-color: var(--border);
        }

        .plus-sign {
            color: var(--text3);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .formula-note {
            font-size: 0.82rem;
            color: var(--text3);
            margin-top: 4px;
        }

        .formula-note strong {
            color: var(--text2);
        }

        /* -- Section Heading -- */
        .section-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            margin-top: 6px;
        }

        .sh-badge {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .sh-badge.amber {
            background: var(--accent-light);
            color: var(--accent);
        }

        .sh-badge.teal {
            background: var(--teal-light);
            color: var(--teal);
        }

        .sh-badge.rose {
            background: var(--rose-light);
            color: var(--rose);
        }

        .sh-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* -- Example Block -- */
        .example-block {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 12px;
        }

        .ex-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 10px;
        }

        .sentence {
            font-family: 'Fraunces', serif;
            font-size: 1.2rem;
            font-weight: 400;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 10px;
            letter-spacing: 0.01em;
        }

        .word {
            display: inline-block;
            padding: 2px 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.15s;
            position: relative;
        }

        .word.s {
            color: var(--teal);
        }

        .word.m {
            color: var(--accent);
        }

        .word.v {
            color: var(--rose);
        }

        .word.o {
            color: var(--emerald);
        }

        .word.c {
            color: var(--indigo);
        }

        .word:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .word::after {
            content: attr(data-label);
            position: absolute;
            bottom: calc(100%+6px);
            left: 50%;
            transform: translateX(-50%) scale(0.85);
            background: var(--ink);
            color: var(--bg);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: 0.04em;
            font-family: 'Plus Jakarta Sans', sans-serif;
            opacity: 0;
            pointer-events: none;
            transition: 0.18s;
            z-index: 10;
        }

        .word:hover::after {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .ex-translation {
            font-size: 0.83rem;
            color: var(--text3);
            font-style: italic;
        }

        /* -- Highlight & Warn -- */
        .highlight-box {
            background: var(--accent-light);
            border: 1px solid rgba(180, 83, 9, 0.18);
            border-radius: 14px;
            padding: 16px 18px;
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
        }

        .hl-icon {
            font-size: 1.05rem;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .hl-text {
            font-size: 0.87rem;
            line-height: 1.65;
            color: var(--accent);
            font-weight: 500;
        }

        .hl-text strong {
            font-weight: 700;
        }

        .warn-box {
            background: var(--rose-light);
            border: 1px solid rgba(159, 18, 57, 0.18);
            border-radius: 14px;
            padding: 16px 18px;
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
        }

        .warn-text {
            font-size: 0.87rem;
            line-height: 1.65;
            color: var(--rose);
            font-weight: 500;
        }

        .warn-text strong {
            font-weight: 700;
        }

        /* -- Tips -- */
        .tips-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tip-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 14px 16px;
            background: var(--surface2);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .tip-num {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--accent-light);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        .tip-text {
            font-size: 0.88rem;
            line-height: 1.65;
            color: var(--text2);
        }

        .tip-text strong {
            color: var(--text);
            font-weight: 700;
        }

        /* -- Tab -- */
        .tab-bar {
            display: flex;
            gap: 4px;
            background: var(--surface2);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 9px;
            border: none;
            background: none;
            border-radius: 9px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text2);
            transition: 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .tab-btn.active {
            background: var(--surface);
            color: var(--accent);
            box-shadow: var(--shadow);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* Table Structure inside Tab */
        .pronoun-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .pronoun-table th {
            background: rgba(0, 0, 0, 0.03);
            text-align: left;
            padding: 12px;
            font-weight: 700;
            color: var(--text);
            border-bottom: 2px solid var(--border);
        }

        .pronoun-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text2);
        }

        .pronoun-table tr:hover td {
            background: rgba(0, 0, 0, 0.02);
        }

        .pronoun-table strong {
            color: var(--accent);
        }

        /* -- Quiz -- */
        .quiz-card {
            background: linear-gradient(135deg, #0f766e, #064e3b);
            border-radius: 20px;
            padding: 36px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
        }

        .quiz-card::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
        }

        .quiz-prompt {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.65;
            margin-bottom: 14px;
            position: relative;
            z-index: 1;
        }

        .quiz-q {
            font-family: 'Fraunces', serif;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 24px;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .q-option {
            background: rgba(255, 255, 255, 0.12);
            border: 1.5px solid rgba(255, 255, 255, 0.22);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 0.88rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .q-option:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: translateY(-1px);
        }

        .q-option.correct {
            background: rgba(255, 255, 255, 0.28);
            border-color: white;
        }

        .q-option.wrong {
            background: rgba(0, 0, 0, 0.25);
            border-color: rgba(255, 100, 100, 0.5);
        }

        .quiz-feedback {
            margin-top: 14px;
            font-size: 0.88rem;
            font-weight: 600;
            opacity: 0;
            transition: 0.3s;
            position: relative;
            z-index: 1;
            line-height: 1.5;
        }

        .quiz-feedback.show {
            opacity: 1;
        }

        .quiz-next {
            margin-top: 16px;
            background: white;
            color: #0f766e;
            border: none;
            padding: 11px 26px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            display: none;
            transition: 0.2s;
            position: relative;
            z-index: 1;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .quiz-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        /* -- CTA -- */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--text3);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .cta-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 26px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.93rem;
            cursor: pointer;
            text-decoration: none;
            transition: 0.25s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .btn-primary:hover {
            background: var(--accent-mid);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 26px;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.93rem;
            cursor: pointer;
            text-decoration: none;
            transition: 0.25s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <link rel="stylesheet" href="android-optimized.css">
    <script src="android-optimized.js" defer></script>
</head>

<body>

    <div class="progress-bar" id="progressBar"></div>
    <div class="backdrop" id="backdrop" onclick="closeSidebar()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="logo"><span class="brand-logo-mark"><img class="brand-logo-img" src="assets/brand-logo.png" alt="Logo QuizNation" loading="lazy" decoding="async"></span><span class="brand-logo-word">QuizNation</span> <button class="logo-close" onclick="closeSidebar()">✕</button></div>
        <div class="nav-label">Menu Utama</div>
        <a href="index.html" class="nav-link">📚 Materi</a>
                    <a href="tenses.html" class="btn-primary">Lanjut Modul 2: Tenses ?</a>
                </div>
            </div>

        </div>
    </main>

    <script>
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') { document.body.classList.add('dark'); document.getElementById('themeBtn').textContent = '📚'; }

        function toggleTheme() {
            const d = document.body.classList.toggle('dark');
            localStorage.setItem('theme', d ? 'dark' : 'light');
            document.getElementById('themeBtn').textContent = d ? '☀️' : '🌙';
        }

        function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('backdrop').classList.add('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('backdrop').classList.remove('open'); }

        window.addEventListener('scroll', () => {
            const el = document.documentElement;
            document.getElementById('progressBar').style.width = (el.scrollTop / (el.scrollHeight - el.clientHeight) * 100) + '%';
        });

        const obs = new IntersectionObserver(entries => {
            entries.forEach((e, i) => { if (e.isIntersecting) { setTimeout(() => e.target.classList.add('visible'), i * 55); obs.unobserve(e.target); } });
        }, { threshold: 0.07 });
        document.querySelectorAll('[data-card]').forEach(c => obs.observe(c));

        function switchTab(btn, id) {
            btn.closest('.card').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            btn.closest('.card').querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
        }

        // Updated Questions for Nouns & Pronouns
        const questions = [
            { q: "We bought some new _____ for our living room.", opts: ["furnitures", "furniture", "a furniture", "the furnitures"], ans: 1, exp: "? 'furniture' — Furniture adalah uncountable noun (kata benda yang tidak bisa dihitung). Jadi, tidak boleh ditambah akhiran 's'." },
            { q: "The teacher asked _____ to submit the assignment by Friday.", opts: ["he and I", "him and me", "him and I", "he and me"], ans: 1, exp: "? 'him and me' — Keduanya berfungsi sebagai objek dari kata kerja 'asked'. Object pronoun dari He adalah Him, dan I adalah Me." },
            { q: "She bought the dress all by _____.", opts: ["hers", "her", "herself", "she"], ans: 2, exp: "? 'herself' — Digunakan sebagai reflexive pronoun (memantul ke subjek 'She') dengan makna 'sendirian' (by herself)." },
            { q: "Everyone in the class _____ passed the final test.", opts: ["have", "has", "are", "were"], ans: 1, exp: "? 'has' — Indefinite pronoun seperti 'Everyone' selalu dianggap tunggal (singular), sehingga harus menggunakan 'has'." },
            { q: "There are many _____ playing in the park.", opts: ["child", "childs", "children", "childrens"], ans: 2, exp: "? 'children' — Bentuk jamak (plural) dari kata 'child' adalah 'children' (irregular plural noun)." },
            { q: "The girl _____ I talked to yesterday is my cousin.", opts: ["who", "whom", "whose", "which"], ans: 1, exp: "? 'whom' — Digunakan karena menggantikan Objek. (I talked to *her* -> whom I talked to). Setelahnya diikuti subjek baru 'I'." },
            { q: "Is this book _____ or mine?", opts: ["your", "you", "yours", "yourself"], ans: 2, exp: "? 'yours' — Berfungsi sebagai Possessive Pronoun (kata ganti kepemilikan) yang berdiri sendiri tanpa noun di belakangnya." },
            { q: "I need to give you an important _____.", opts: ["advices", "piece of advice", "advice", "advise"], ans: 1, exp: "? 'piece of advice' — Advice adalah uncountable noun, jadi tidak bisa menggunakan 'an advice' atau 'advices'. Gunakan 'a piece of' untuk menghitungnya." }
        ];

        let current = 0, score = 0, answered = false;

        function renderQuestion() {
            const q = questions[current];
            document.getElementById('qNum').textContent = current + 1;
            document.getElementById('qTotal').textContent = questions.length;
            document.getElementById('qText').textContent = q.q;
            document.getElementById('qFeedback').textContent = '';
            document.getElementById('qFeedback').classList.remove('show');
            document.getElementById('qNext').style.display = 'none';
            answered = false;

            const optDiv = document.getElementById('qOptions');
            optDiv.innerHTML = '';
            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'q-option'; btn.textContent = opt;
                btn.onclick = () => selectAnswer(i);
                optDiv.appendChild(btn);
            });
        }

        function selectAnswer(i) {
            if (answered) return;
            answered = true;
            const q = questions[current];
            const opts = document.querySelectorAll('.q-option');
            opts[i].classList.add(i === q.ans ? 'correct' : 'wrong');
            if (i !== q.ans) opts[q.ans].classList.add('correct'); else score++;

            const fb = document.getElementById('qFeedback');
            fb.textContent = i === q.ans ? q.exp : '? Kurang tepat. ' + q.exp;
            fb.classList.add('show');

            const nxt = document.getElementById('qNext');
            nxt.style.display = 'inline-block';
            if (current === questions.length - 1) nxt.textContent = `Lihat Hasil ?`;
        }

        function nextQuestion() {
            current++;
            if (current < questions.length) { renderQuestion(); return; }

            const s = score; const total = questions.length;
            const grade = s >= 7 ? '🏆' : s >= 5 ? '⭐' : '🌱';
            const msg = s === total ? 'Sempurna! Kamu menguasai Modul 1 dengan sangat baik.' : s >= 6 ? 'Bagus sekali! Hampir sempurna.' : s >= 4 ? 'Lumayan! Baca ulang bagian Uncountable Nouns ya.' : 'Ayo ulangi materi ini, ingat rumus singular vs plural!';

            document.getElementById('quizCard').innerHTML = `
                <div class="quiz-prompt" style="position:relative;z-index:1">Hasil Akhir</div>
                <div class="quiz-q" style="position:relative;z-index:1;font-size:2.8rem">${grade}</div>
                <div class="quiz-q" style="position:relative;z-index:1">Skor: ${s} / ${total}</div>
                <p style="position:relative;z-index:1;opacity:0.82;font-size:0.88rem;margin-top:6px">${msg}</p>
                <button class="quiz-next" style="display:inline-block;margin-top:16px" onclick="restartQuiz()">Ulangi Quiz</button>`;
        }

        function restartQuiz() {
            current = 0; score = 0;
            document.getElementById('quizCard').innerHTML = `
                <div class="quiz-prompt">Pertanyaan <span id="qNum">1</span> dari <span id="qTotal">8</span></div>
                <div class="quiz-q" id="qText"></div>
                <div class="quiz-options" id="qOptions"></div>
                <div class="quiz-feedback" id="qFeedback"></div>
                <button class="quiz-next" id="qNext" onclick="nextQuestion()">Pertanyaan Berikutnya ?</button>`;
            renderQuestion();
        }

        renderQuestion();
    </script>
</body>

</html>
