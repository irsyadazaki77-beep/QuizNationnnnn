<!DOCTYPE html>
<html lang="id">

<head>
    <meta name="theme-color" content="#0a1120" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Kosakata Kehidupan Sehari-hari - QuizNation</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&display=swap"
        rel="stylesheet">
    <style>
        /* Mobile Optimization */
        html,
        body {
            max-width: 100%;
            overflow-x: hidden;
        }

        * {
            -webkit-tap-highlight-color: transparent !important;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f8f7f4;
            --surface: #ffffff;
            --surface2: #f1f0ea;
            --border: #e8e6dd;
            --text: #1c1a17;
            --text2: #5c5848;
            --text3: #9c9880;
            --ink: #1c1a17;

            --accent: #2d6a4f;
            --accent-mid: #40916c;
            --accent-light: #d8f3dc;
            --accent-glow: rgba(45, 106, 79, 0.12);

            --rose: #9f1239;
            --rose-light: #ffe4e6;
            --teal: #0f766e;
            --teal-light: #ccfbf1;
            --indigo: #3730a3;
            --indigo-light: #e0e7ff;
            --amber: #92400e;
            --amber-light: #fef3c7;
            --orange: #c2410c;
            --orange-light: #ffedd5;
            --blue: #1a4e8a;
            --blue-light: #dbeafe;

            --sidebar-w: 260px;
            --r: 20px;
            --r-sm: 12px;
            --shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 40px rgba(0, 0, 0, 0.09);
        }

        body.dark {
            --bg: #100f0c;
            --surface: #18170e;
            --surface2: #211f14;
            --border: #2c2a1e;
            --text: #f2f0e8;
            --text2: #a8a488;
            --text3: #6a6650;
            --ink: #f2f0e8;
            --accent-light: rgba(45, 106, 79, 0.2);
            --rose-light: rgba(159, 18, 57, 0.18);
            --teal-light: rgba(15, 118, 110, 0.18);
            --indigo-light: rgba(30, 58, 138, 0.18);
            --amber-light: rgba(146, 64, 14, 0.18);
            --orange-light: rgba(194, 65, 12, 0.18);
            --blue-light: rgba(26, 78, 138, 0.2);
            --shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 8px 40px rgba(0, 0, 0, 0.55);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            transition: background 0.4s, color 0.4s;
            overflow-x: hidden;
        }

        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .backdrop.open {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            z-index: 100;
            padding: 28px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media(min-width:1024px) {
            .sidebar {
                transform: translateX(0);
            }
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .logo {
            font-family: 'Fraunces', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 28px;
            padding: 0 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-close {
            display: none;
            background: none;
            border: none;
            color: var(--text2);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            line-height: 1;
        }

        @media(max-width:1023px) {
            .logo-close {
                display: block;
            }
        }

        .nav-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text3);
            padding: 16px 12px 6px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--r-sm);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text2);
            transition: 0.15s;
        }

        .nav-link:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-link.active {
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 700;
        }

        .hamburger {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 110;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text);
            box-shadow: var(--shadow);
        }

        @media(max-width:1023px) {
            .hamburger {
                display: flex;
            }
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 110;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: var(--shadow);
            transition: 0.3s;
        }

        .main {
            flex: 1;
            margin-left: 0;
            transition: margin 0.4s;
            min-width: 0;
        }

        @media(min-width:1024px) {
            .main {
                margin-left: var(--sidebar-w);
            }
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--teal));
            z-index: 200;
            transition: width 0.15s;
            border-radius: 0 2px 2px 0;
        }

        .hero {
            padding: 80px 48px 56px;
            max-width: 840px;
            margin: 0 auto;
            opacity: 0;
            animation: rise 0.7s 0.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @media(max-width:768px) {
            .hero {
                padding: 72px 24px 40px;
            }
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text3);
            margin-bottom: 28px;
            font-weight: 500;
        }

        .breadcrumb span {
            color: var(--text2);
        }

        .module-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 100px;
            background: var(--accent-light);
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 20px;
            border: 1px solid rgba(45, 106, 79, 0.18);
        }

        .hero h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(2.2rem, 5vw, 3.4rem);
            font-weight: 700;
            line-height: 1.1;
            color: var(--text);
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--accent);
        }

        .hero p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text2);
            max-width: 560px;
        }

        .hero-stats {
            display: flex;
            gap: 20px;
            margin-top: 36px;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text2);
            font-weight: 500;
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }

        .content {
            max-width: 840px;
            margin: 0 auto;
            padding: 0 48px 100px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        @media(max-width:768px) {
            .content {
                padding: 0 20px 80px;
            }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 36px;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(24px);
            transition: box-shadow 0.3s, transform 0.3s;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        @media(max-width:768px) {
            .card {
                padding: 24px;
            }
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .card-title {
            font-family: 'Fraunces', serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .card-subtitle {
            font-size: 0.82rem;
            color: var(--text3);
            margin-top: 2px;
            font-weight: 500;
        }

        .body-text {
            font-size: 0.97rem;
            line-height: 1.8;
            color: var(--text2);
            margin-bottom: 24px;
        }

        .body-text strong {
            color: var(--text);
            font-weight: 700;
        }

        /* Vocab Grid */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .vocab-item {
            border-radius: 16px;
            padding: 20px;
            border: 1.5px solid transparent;
            cursor: default;
            transition: 0.25s;
        }

        .vocab-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .vi-word {
            font-family: 'Fraunces', serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .vi-pron {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            margin-bottom: 6px;
            opacity: 0.7;
        }

        .vi-meaning {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .vi-example {
            font-size: 0.8rem;
            font-style: italic;
            line-height: 1.5;
        }

        .vi-home {
            background: var(--accent-light);
            border-color: rgba(45, 106, 79, 0.2);
        }

        .vi-home .vi-word,
        .vi-home .vi-meaning {
            color: var(--accent);
        }

        .vi-home .vi-example {
            color: var(--accent);
        }

        .vi-food {
            background: var(--orange-light);
            border-color: rgba(194, 65, 12, 0.2);
        }

        .vi-food .vi-word,
        .vi-food .vi-meaning {
            color: var(--orange);
        }

        .vi-food .vi-example {
            color: var(--orange);
        }

        .vi-work {
            background: var(--indigo-light);
            border-color: rgba(30, 58, 138, 0.2);
        }

        .vi-work .vi-word,
        .vi-work .vi-meaning {
            color: var(--indigo);
        }

        .vi-work .vi-example {
            color: var(--indigo);
        }

        .vi-activity {
            background: var(--teal-light);
            border-color: rgba(15, 118, 110, 0.2);
        }

        .vi-activity .vi-word,
        .vi-activity .vi-meaning {
            color: var(--teal);
        }

        .vi-activity .vi-example {
            color: var(--teal);
        }

        .vi-transport {
            background: var(--amber-light);
            border-color: rgba(146, 64, 14, 0.2);
        }

        .vi-transport .vi-word,
        .vi-transport .vi-meaning {
            color: var(--amber);
        }

        .vi-transport .vi-example {
            color: var(--amber);
        }

        .vi-feeling {
            background: var(--rose-light);
            border-color: rgba(159, 18, 57, 0.2);
        }

        .vi-feeling .vi-word,
        .vi-feeling .vi-meaning {
            color: var(--rose);
        }

        .vi-feeling .vi-example {
            color: var(--rose);
        }

        .vi-body {
            background: var(--blue-light);
            border-color: rgba(26, 78, 138, 0.2);
        }

        .vi-body .vi-word,
        .vi-body .vi-meaning {
            color: var(--blue);
        }

        .vi-body .vi-example {
            color: var(--blue);
        }

        /* Section Heading */
        .section-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            margin-top: 6px;
        }

        .sh-badge {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .sh-badge.green {
            background: var(--accent-light);
            color: var(--accent);
        }

        .sh-badge.teal {
            background: var(--teal-light);
            color: var(--teal);
        }

        .sh-badge.rose {
            background: var(--rose-light);
            color: var(--rose);
        }

        .sh-badge.amber {
            background: var(--amber-light);
            color: var(--amber);
        }

        .sh-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Highlight & Warn */
        .highlight-box {
            background: var(--accent-light);
            border: 1px solid rgba(45, 106, 79, 0.18);
            border-radius: 14px;
            padding: 16px 18px;
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
        }

        .hl-icon {
            font-size: 1.05rem;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .hl-text {
            font-size: 0.87rem;
            line-height: 1.65;
            color: var(--accent);
            font-weight: 500;
        }

        .hl-text strong {
            font-weight: 700;
        }

        /* Grid */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .mini-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            transition: 0.25s;
            cursor: default;
        }

        .mini-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .mini-icon {
            font-size: 1.4rem;
            margin-bottom: 12px;
        }

        .mini-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 7px;
        }

        .mini-text {
            font-size: 0.82rem;
            line-height: 1.6;
            color: var(--text2);
        }

        .mini-text em {
            font-style: normal;
            font-weight: 600;
            color: var(--accent);
        }

        /* Vocab Table */
        .vocab-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .vocab-table th {
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 700;
            padding: 10px 16px;
            text-align: left;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .vocab-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text2);
        }

        .vocab-table tr:last-child td {
            border-bottom: none;
        }

        .vocab-table tr:hover td {
            background: var(--surface2);
        }

        .vocab-table .eng {
            color: var(--text);
            font-weight: 600;
        }

        .vocab-table .indo {
            color: var(--accent);
            font-weight: 600;
        }

        /* Tab */
        .tab-bar {
            display: flex;
            gap: 4px;
            background: var(--surface2);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .tab-btn {
            flex: 1;
            padding: 9px;
            border: none;
            background: none;
            border-radius: 9px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text2);
            transition: 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--surface);
            color: var(--accent);
            box-shadow: var(--shadow);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* Tips */
        .tips-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tip-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 14px 16px;
            background: var(--surface2);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .tip-num {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--accent-light);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        .tip-text {
            font-size: 0.88rem;
            line-height: 1.65;
            color: var(--text2);
        }

        .tip-text strong {
            color: var(--text);
            font-weight: 700;
        }

        /* Quiz */
        .quiz-card {
            background: linear-gradient(135deg, #2d6a4f, #0f766e);
            border-radius: 20px;
            padding: 36px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
        }

        .quiz-card::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
        }

        .quiz-prompt {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.65;
            margin-bottom: 14px;
            position: relative;
            z-index: 1;
        }

        .quiz-q {
            font-family: 'Fraunces', serif;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 24px;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .q-option {
            background: rgba(255, 255, 255, 0.12);
            border: 1.5px solid rgba(255, 255, 255, 0.22);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 0.88rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .q-option:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: translateY(-1px);
        }

        .q-option.correct {
            background: rgba(255, 255, 255, 0.28);
            border-color: white;
        }

        .q-option.wrong {
            background: rgba(0, 0, 0, 0.25);
            border-color: rgba(255, 100, 100, 0.5);
        }

        .quiz-feedback {
            margin-top: 14px;
            font-size: 0.88rem;
            font-weight: 600;
            opacity: 0;
            transition: 0.3s;
            position: relative;
            z-index: 1;
            line-height: 1.5;
        }

        .quiz-feedback.show {
            opacity: 1;
        }

        .quiz-next {
            margin-top: 16px;
            background: white;
            color: #2d6a4f;
            border: none;
            padding: 11px 26px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            display: none;
            transition: 0.2s;
            position: relative;
            z-index: 1;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .quiz-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        /* CTA */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--text3);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .cta-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 26px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.93rem;
            cursor: pointer;
            text-decoration: none;
            transition: 0.25s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .btn-primary:hover {
            background: var(--accent-mid);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 26px;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.93rem;
            cursor: pointer;
            text-decoration: none;
            transition: 0.25s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <link rel="stylesheet" href="android-optimized.css">
    <script src="android-optimized.js" defer></script>
</head>

<body>

    <div class="progress-bar" id="progressBar"></div>
    <div class="backdrop" id="backdrop" onclick="closeSidebar()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="logo"><span class="brand-logo-mark"><img class="brand-logo-img" src="assets/brand-logo.png" alt="Logo QuizNation" loading="lazy" decoding="async"></span><span class="brand-logo-word">QuizNation</span> <button class="logo-close" onclick="closeSidebar()">✕</button></div>
        <div class="nav-label">Menu Utama</div>
        <a href="index.html" class="nav-link">📚 Materi</a>
                    <a href="materi-vocab-bisnis.html" class="btn-primary">Vocabulary Bisnis ?</a>
                </div>
            </div>

        </div>
    </main>

    <script>
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') { document.body.classList.add('dark'); document.getElementById('themeBtn').textContent = '🔹'; }
        function toggleTheme() {
            const d = document.body.classList.toggle('dark');
            localStorage.setItem('theme', d ? 'dark' : 'light');
            document.getElementById('themeBtn').textContent = d ? '☀️' : '🌙';
        }
        function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('backdrop').classList.add('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('backdrop').classList.remove('open'); }
        window.addEventListener('scroll', () => {
            const el = document.documentElement;
            document.getElementById('progressBar').style.width = (el.scrollTop / (el.scrollHeight - el.clientHeight) * 100) + '%';
        });
        const obs = new IntersectionObserver(entries => {
            entries.forEach((e, i) => { if (e.isIntersecting) { setTimeout(() => e.target.classList.add('visible'), i * 55); obs.unobserve(e.target); } });
        }, { threshold: 0.07 });
        document.querySelectorAll('[data-card]').forEach(c => obs.observe(c));
        function switchTab(btn, id) {
            btn.closest('.card').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            btn.closest('.card').querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
        }

        const questions = [
            { q: "Apa bahasa Inggris dari 'dapur'?", opts: ["Bedroom", "Bathroom", "Kitchen", "Garage"], ans: 2, exp: "? 'Kitchen' = Dapur. Tempat untuk memasak." },
            { q: "\"I ___ at 6 AM every morning.\" Pilih kata yang tepat!", opts: ["wake up", "sleep", "eat", "run"], ans: 0, exp: "? 'wake up' = bangun tidur. Konteks kalimat menunjukkan aktivitas pagi." },
            { q: "Apa arti kata 'delicious'?", opts: ["Mahal", "Lezat", "Murah", "Pedas"], ans: 1, exp: "? 'Delicious' = lezat/enak. Contoh: 'This food is delicious!'" },
            { q: "Manakah yang BUKAN termasuk transportasi?", opts: ["Bus", "Train", "Pillow", "Bicycle"], ans: 2, exp: "? 'Pillow' = bantal, bukan alat transportasi. Pillow ada di kamar tidur." },
            { q: "\"She feels ___ about the exam.\" (Dia merasa gugup tentang ujian)", opts: ["happy", "nervous", "grateful", "angry"], ans: 1, exp: "? 'Nervous' = gugup. Cocok untuk konteks ujian yang membuat tegang." },
            { q: "Apa bahasa Inggris dari 'petani'?", opts: ["Farmer", "Lawyer", "Engineer", "Chef"], ans: 0, exp: "? 'Farmer' = petani. Orang yang bekerja di ladang/sawah." },
            { q: "\"Please put the milk in the ___.\"", opts: ["oven", "sink", "refrigerator", "cupboard"], ans: 2, exp: "? 'Refrigerator' (kulkas) untuk menyimpan susu agar tetap dingin." },
            { q: "Apa arti 'commute'?", opts: ["Memasak", "Pergi-pulang kerja", "Berolahraga", "Mencuci"], ans: 1, exp: "? 'Commute' = pergi-pulang kerja/sekolah. Contoh: 'He commutes by train.'" }
        ];

        let current = 0, score = 0, answered = false;
        function renderQuestion() {
            const q = questions[current];
            document.getElementById('qNum').textContent = current + 1;
            document.getElementById('qTotal').textContent = questions.length;
            document.getElementById('qText').textContent = q.q;
            document.getElementById('qFeedback').textContent = '';
            document.getElementById('qFeedback').classList.remove('show');
            document.getElementById('qNext').style.display = 'none';
            answered = false;
            const optDiv = document.getElementById('qOptions');
            optDiv.innerHTML = '';
            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'q-option'; btn.textContent = opt;
                btn.onclick = () => selectAnswer(i);
                optDiv.appendChild(btn);
            });
        }
        function selectAnswer(i) {
            if (answered) return;
            answered = true;
            const q = questions[current];
            const opts = document.querySelectorAll('.q-option');
            opts[i].classList.add(i === q.ans ? 'correct' : 'wrong');
            if (i !== q.ans) opts[q.ans].classList.add('correct'); else score++;
            const fb = document.getElementById('qFeedback');
            fb.textContent = i === q.ans ? q.exp : '? Kurang tepat. ' + q.exp;
            fb.classList.add('show');
            const nxt = document.getElementById('qNext');
            nxt.style.display = 'inline-block';
            if (current === questions.length - 1) nxt.textContent = 'Lihat Hasil ?';
        }
        function nextQuestion() {
            current++;
            if (current < questions.length) { renderQuestion(); return; }
            const s = score; const total = questions.length;
            const grade = s >= 7 ? '🏆' : s >= 5 ? '⭐' : '🌱';
            const msg = s === total ? 'Sempurna! Kamu menguasai kosakata sehari-hari.' : s >= 6 ? 'Bagus sekali! Hampir sempurna.' : s >= 4 ? 'Lumayan! Ulangi kata-kata yang masih salah ya.' : 'Ayo baca ulang materinya dan coba lagi!';
            document.getElementById('quizCard').innerHTML = `
    <div class="quiz-prompt" style="position:relative;z-index:1">Hasil Akhir</div>
    <div class="quiz-q" style="position:relative;z-index:1;font-size:2.8rem">${grade}</div>
    <div class="quiz-q" style="position:relative;z-index:1">Skor: ${s} / ${total}</div>
    <p style="position:relative;z-index:1;opacity:0.82;font-size:0.88rem;margin-top:6px">${msg}</p>
    <button class="quiz-next" style="display:inline-block;margin-top:16px" onclick="restartQuiz()">Ulangi Quiz</button>`;
        }
        function restartQuiz() {
            current = 0; score = 0;
            document.getElementById('quizCard').innerHTML = `
    <div class="quiz-prompt">Pertanyaan <span id="qNum">1</span> dari <span id="qTotal">8</span></div>
    <div class="quiz-q" id="qText"></div>
    <div class="quiz-options" id="qOptions"></div>
    <div class="quiz-feedback" id="qFeedback"></div>
    <button class="quiz-next" id="qNext" onclick="nextQuestion()">Pertanyaan Berikutnya ?</button>`;
            renderQuestion();
        }
        renderQuestion();
    </script>
</body>

</html>
