<!DOCTYPE html>
<html lang="id">

<head>
    <meta name="theme-color" content="#0a1120" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Pengenalan Kalimat - QuizNation</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&display=swap"
        rel="stylesheet">

    <style>
        /* Mobile Optimization */
        html, body { max-width: 100%; overflow-x: hidden; }
        * { -webkit-tap-highlight-color: transparent !important; }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f7f6f2;
            --surface: #ffffff;
            --surface2: #f0efe9;
            --border: #e5e4dc;
            --text: #1a1916;
            --text2: #5a5850;
            --text3: #9a9888;
            --ink: #1a1916;

            --green: #2d6a4f;
            --green-mid: #40916c;
            --green-light: #d8f3dc;
            --green-glow: rgba(64, 145, 108, 0.12);

            --blue: #1a4e8a;
            --blue-light: #dbeafe;
            --red: #b91c1c;
            --red-light: #fee2e2;
            --amber: #92400e;
            --amber-light: #fef3c7;
            --violet: #1e3a8a;
            --violet-light: #dbeafe;

            --sidebar-w: 260px;
            --r: 20px;
            --r-sm: 12px;
            --shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 40px rgba(0, 0, 0, 0.08);
        }

        body.dark {
            --bg: #0f0f0d;
            --surface: #1a1916;
            --surface2: #24231f;
            --border: #2e2d28;
            --text: #f5f4ef;
            --text2: #a8a698;
            --text3: #6a6858;
            --ink: #f5f4ef;
            --green-light: rgba(45, 106, 79, 0.2);
            --blue-light: rgba(26, 78, 138, 0.2);
            --red-light: rgba(185, 28, 28, 0.2);
            --amber-light: rgba(146, 64, 14, 0.2);
            --violet-light: rgba(91, 33, 182, 0.2);
            --shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 40px rgba(0, 0, 0, 0.4);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            transition: background 0.4s, color 0.4s;
            overflow-x: hidden;
        }

        /* -- Sidebar -- */
        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .backdrop.open {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            z-index: 100;
            padding: 28px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media(min-width: 1024px) {
            .sidebar {
                transform: translateX(0);
            }
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .logo {
            font-family: 'Fraunces', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--green);
            margin-bottom: 28px;
            padding: 0 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-close {
            display: none;
            background: none;
            border: none;
            color: var(--text2);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            line-height: 1;
        }

        @media(max-width: 1023px) {
            .logo-close {
                display: block;
            }
        }

        .nav-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text3);
            padding: 16px 12px 6px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--r-sm);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text2);
            transition: 0.15s;
        }

        .nav-link:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-link.active {
            background: var(--green-light);
            color: var(--green);
            font-weight: 700;
        }

        /* -- Hamburger -- */
        .hamburger {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 110;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text);
            box-shadow: var(--shadow);
        }

        @media(max-width: 1023px) {
            .hamburger {
                display: flex;
            }
        }

        /* -- Theme Toggle -- */
        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 110;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: var(--shadow);
            transition: 0.3s;
        }

        /* -- Main -- */
        .main {
            flex: 1;
            margin-left: 0;
            transition: margin 0.4s;
            min-width: 0;
        }

        @media(min-width: 1024px) {
            .main {
                margin-left: var(--sidebar-w);
            }
        }

        /* -- Progress Bar -- */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--green), #52b788);
            z-index: 200;
            transition: width 0.15s;
            border-radius: 0 2px 2px 0;
        }

        /* -- Hero -- */
        .hero {
            padding: 80px 48px 56px;
            max-width: 840px;
            margin: 0 auto;
            opacity: 0;
            animation: rise 0.7s 0.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @media(max-width: 768px) {
            .hero {
                padding: 72px 24px 40px;
            }
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text3);
            margin-bottom: 28px;
            font-weight: 500;
        }

        .breadcrumb span {
            color: var(--text2);
        }

        .module-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 100px;
            background: var(--green-light);
            color: var(--green);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 20px;
            border: 1px solid rgba(45, 106, 79, 0.15);
        }

        .hero h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(2.2rem, 5vw, 3.4rem);
            font-weight: 700;
            line-height: 1.1;
            color: var(--text);
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--green);
        }

        .hero p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text2);
            max-width: 560px;
        }

        /* Stat row */
        .hero-stats {
            display: flex;
            gap: 20px;
            margin-top: 36px;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text2);
            font-weight: 500;
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
        }

        /* -- Content -- */
        .content {
            max-width: 840px;
            margin: 0 auto;
            padding: 0 48px 100px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        @media(max-width: 768px) {
            .content {
                padding: 0 20px 80px;
            }
        }

        /* -- Cards -- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 36px;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(24px);
            transition: box-shadow 0.3s, transform 0.3s;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        @media(max-width: 768px) {
            .card {
                padding: 24px;
            }
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--green-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .card-title {
            font-family: 'Fraunces', serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .card-subtitle {
            font-size: 0.82rem;
            color: var(--text3);
            margin-top: 2px;
            font-weight: 500;
        }

        .body-text {
            font-size: 0.97rem;
            line-height: 1.8;
            color: var(--text2);
            margin-bottom: 24px;
        }

        .body-text strong {
            color: var(--text);
            font-weight: 700;
        }

        /* -- Formula Strip -- */
        .formula-strip {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .formula-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .f-chip {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.92rem;
            letter-spacing: 0.02em;
            border: 1.5px solid transparent;
            cursor: default;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
        }

        .f-chip:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .f-chip.s {
            background: var(--blue-light);
            color: var(--blue);
            border-color: rgba(26, 78, 138, 0.2);
        }

        .f-chip.v {
            background: var(--red-light);
            color: var(--red);
            border-color: rgba(185, 28, 28, 0.2);
        }

        .f-chip.o {
            background: var(--green-light);
            color: var(--green);
            border-color: rgba(45, 106, 79, 0.2);
        }

        .f-chip.c {
            background: var(--amber-light);
            color: var(--amber);
            border-color: rgba(146, 64, 14, 0.2);
        }

        .f-chip.tobe {
            background: var(--violet-light);
            color: var(--violet);
            border-color: rgba(91, 33, 182, 0.2);
        }

        .plus-sign {
            color: var(--text3);
            font-weight: 600;
            font-size: 1rem;
        }

        .formula-note {
            font-size: 0.83rem;
            color: var(--text3);
            text-align: center;
        }

        .formula-note strong {
            color: var(--text2);
        }

        /* -- Grid Cards -- */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .mini-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            transition: 0.3s;
            cursor: default;
        }

        .mini-card:hover {
            border-color: var(--green);
            box-shadow: 0 4px 24px var(--green-glow);
            transform: translateY(-3px);
        }

        .mini-icon {
            font-size: 1.5rem;
            margin-bottom: 14px;
        }

        .mini-title {
            font-weight: 700;
            font-size: 0.93rem;
            color: var(--text);
            margin-bottom: 8px;
        }

        .mini-text {
            font-size: 0.83rem;
            line-height: 1.6;
            color: var(--text2);
        }

        .mini-text em {
            color: var(--green);
            font-style: normal;
            font-weight: 600;
        }

        /* -- Example Sentence Block -- */
        .example-block {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .ex-label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 12px;
        }

        .sentence {
            font-family: 'Fraunces', serif;
            font-size: 1.25rem;
            font-weight: 400;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 14px;
            letter-spacing: 0.01em;
        }

        .word {
            display: inline-block;
            padding: 2px 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.15s;
            position: relative;
        }

        .word.s {
            color: var(--blue);
        }

        .word.v {
            color: var(--red);
        }

        .word.o {
            color: var(--green);
        }

        .word.c {
            color: var(--amber);
        }

        .word:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .word::after {
            content: attr(data-label);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%) scale(0.85);
            background: var(--ink);
            color: var(--bg);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: 0.04em;
            font-family: 'Plus Jakarta Sans', sans-serif;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
        }

        .word:hover::after {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .ex-translation {
            font-size: 0.85rem;
            color: var(--text3);
            font-style: italic;
        }

        .parts-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .lds {
            background: var(--blue);
        }

        .ldv {
            background: var(--red);
        }

        .ldo {
            background: var(--green);
        }

        .ldc {
            background: var(--amber);
        }

        /* -- Tobe Table -- */
        .tobe-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .tobe-table th {
            background: var(--green-light);
            color: var(--green);
            font-weight: 700;
            padding: 10px 16px;
            text-align: left;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .tobe-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text2);
        }

        .tobe-table tr:last-child td {
            border-bottom: none;
        }

        .tobe-table tr:hover td {
            background: var(--surface2);
        }

        .tobe-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 6px;
            background: var(--violet-light);
            color: var(--violet);
            font-weight: 700;
            font-size: 0.85rem;
        }

        /* -- Verb Table -- */
        .verb-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .verb-table th {
            background: var(--surface2);
            font-weight: 700;
            padding: 10px 16px;
            text-align: left;
            font-size: 0.78rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text2);
            border-bottom: 1px solid var(--border);
        }

        .verb-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .verb-table tr:last-child td {
            border-bottom: none;
        }

        .verb-table tr:hover td {
            background: var(--surface2);
        }

        .v1 {
            color: var(--text);
            font-weight: 600;
        }

        .v2 {
            color: var(--red);
            font-weight: 600;
        }

        .v3 {
            color: var(--green);
            font-weight: 600;
        }

        .tag-reg,
        .tag-irr {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .tag-reg {
            background: var(--blue-light);
            color: var(--blue);
        }

        .tag-irr {
            background: var(--red-light);
            color: var(--red);
        }

        /* -- Tenses Preview -- */
        .tense-timeline {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 12px;
        }

        @media(max-width: 600px) {
            .tense-timeline {
                grid-template-columns: 1fr;
            }
        }

        .tense-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            cursor: default;
            transition: 0.25s;
        }

        .tense-item:hover {
            border-color: var(--green);
            transform: translateY(-2px);
        }

        .tense-time {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text3);
            margin-bottom: 8px;
        }

        .tense-name {
            font-family: 'Fraunces', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .tense-ex {
            font-size: 0.8rem;
            color: var(--green);
            font-style: italic;
        }

        /* -- Quiz Flashcard -- */
        .quiz-card {
            background: linear-gradient(135deg, var(--green), #40916c);
            border-radius: 20px;
            padding: 36px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
        }

        .quiz-card::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
        }

        .quiz-prompt {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .quiz-q {
            font-family: 'Fraunces', serif;
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 28px;
            line-height: 1.4;
            position: relative;
            z-index: 1;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .q-option {
            background: rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .q-option:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }

        .q-option.correct {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
        }

        .q-option.wrong {
            background: rgba(185, 28, 28, 0.3);
            border-color: rgba(185, 28, 28, 0.6);
        }

        .quiz-feedback {
            margin-top: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0;
            transition: 0.3s;
            position: relative;
            z-index: 1;
        }

        .quiz-feedback.show {
            opacity: 1;
        }

        .quiz-next {
            margin-top: 18px;
            background: white;
            color: var(--green);
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: none;
            transition: 0.2s;
            position: relative;
            z-index: 1;
        }

        .quiz-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        /* -- Tips Section -- */
        .tips-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tip-item {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            padding: 16px;
            background: var(--surface2);
            border-radius: 14px;
            border: 1px solid var(--border);
        }

        .tip-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--green-light);
            color: var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        .tip-text {
            font-size: 0.9rem;
            line-height: 1.65;
            color: var(--text2);
        }

        .tip-text strong {
            color: var(--text);
            font-weight: 700;
        }

        /* -- CTA -- */
        .cta-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            transition: 0.25s;
        }

        .btn-primary:hover {
            background: var(--green-mid);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--green-glow);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            transition: 0.25s;
        }

        .btn-secondary:hover {
            border-color: var(--green);
            color: var(--green);
            transform: translateY(-2px);
        }

        /* -- Divider -- */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--text3);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* -- Highlight Box -- */
        .highlight-box {
            background: var(--green-light);
            border: 1px solid rgba(45, 106, 79, 0.2);
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .hl-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .hl-text {
            font-size: 0.88rem;
            line-height: 1.65;
            color: var(--green);
            font-weight: 500;
        }

        .hl-text strong {
            font-weight: 700;
        }

        /* -- Tab system -- */
        .tab-bar {
            display: flex;
            gap: 4px;
            background: var(--surface2);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 9px;
            border: none;
            background: none;
            border-radius: 9px;
            font-size: 0.83rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text2);
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--surface);
            color: var(--green);
            box-shadow: var(--shadow);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* -- Animations -- */
        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <link rel="stylesheet" href="android-optimized.css">
    <script src="android-optimized.js" defer></script>
</head>

<body>

    <div class="progress-bar" id="progressBar"></div>

    <!-- Sidebar Backdrop -->
    <div class="backdrop" id="backdrop" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="logo"><span class="brand-logo-mark"><img class="brand-logo-img" src="assets/brand-logo.png" alt="Logo QuizNation" loading="lazy" decoding="async"></span><span class="brand-logo-word">QuizNation</span> <button class="logo-close" onclick="closeSidebar()">✕</button></div>
        <div class="nav-label">Menu Utama</div>
        <a href="index.html" class="nav-link">📚 Materi</a>
                    <a href="tenses.html" class="btn-primary">Modul 2: Tenses ?</a>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Theme
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') { document.body.classList.add('dark'); document.getElementById('themeBtn').textContent = '🔹'; }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
        }

        // Sidebar
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('backdrop').classList.add('open');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('backdrop').classList.remove('open');
        }

        // Progress Bar
        window.addEventListener('scroll', () => {
            const el = document.documentElement;
            const pct = (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
        });

        // Scroll-reveal cards
        const observer = new IntersectionObserver(entries => {
            entries.forEach((e, i) => {
                if (e.isIntersecting) {
                    setTimeout(() => e.target.classList.add('visible'), i * 60);
                    observer.unobserve(e.target);
                }
            });
        }, { threshold: 0.08 });
        document.querySelectorAll('[data-card]').forEach(c => observer.observe(c));

        // Tabs
        function switchTab(btn, id) {
            btn.closest('.card').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            btn.closest('.card').querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
        }

        // Mini Quiz
        const questions = [
            {
                q: "Dalam kalimat: 'She reads a novel every night.' - apa yang menjadi Subject?",
                opts: ["reads", "She", "a novel", "every night"],
                ans: 1,
                exp: "? Benar! 'She' adalah Pronoun yang berfungsi sebagai Subject (pelaku tindakan)."
            },
            {
                q: "Manakah bentuk lampau (Past Tense) yang BENAR dari kata kerja 'go'?",
                opts: ["goed", "goes", "went", "gone"],
                ans: 2,
                exp: "? Tepat! 'went' adalah bentuk lampau dari 'go' - contoh Irregular Verb."
            },
            {
                q: "Kalimat mana yang BENAR menggunakan 'To Be'?",
                opts: ["I am happy.", "I are happy.", "I is happy.", "I be happy."],
                ans: 0,
                exp: "? Benar! 'am' digunakan khusus untuk subjek 'I'."
            },
            {
                q: "Dalam kalimat: 'My father gave me a gift.' - apa yang menjadi Direct Object?",
                opts: ["My father", "gave", "me", "a gift"],
                ans: 3,
                exp: "? Betul! 'a gift' adalah Direct Object (benda yang langsung diberikan). 'me' adalah Indirect Object."
            },
            {
                q: "Elemen apa yang WAJIB ada dalam setiap kalimat bahasa Inggris yang benar?",
                opts: ["Object saja", "Complement saja", "Subject dan Verb", "Object dan Complement"],
                ans: 2,
                exp: "? Tepat! Setiap kalimat minimal harus punya Subject dan Verb."
            }
        ];

        let current = 0, score = 0, answered = false;

        function renderQuestion() {
            const q = questions[current];
            document.getElementById('qNum').textContent = current + 1;
            document.getElementById('qTotal').textContent = questions.length;
            document.getElementById('qText').textContent = q.q;
            document.getElementById('qFeedback').textContent = '';
            document.getElementById('qFeedback').classList.remove('show');
            document.getElementById('qNext').style.display = 'none';
            answered = false;

            const optDiv = document.getElementById('qOptions');
            optDiv.innerHTML = '';
            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'q-option';
                btn.textContent = opt;
                btn.onclick = () => selectAnswer(i);
                optDiv.appendChild(btn);
            });
        }

        function selectAnswer(i) {
            if (answered) return;
            answered = true;
            const q = questions[current];
            const opts = document.querySelectorAll('.q-option');
            opts[i].classList.add(i === q.ans ? 'correct' : 'wrong');
            if (i === q.ans) { opts[q.ans].classList.add('correct'); score++; }
            else opts[q.ans].classList.add('correct');
            const fb = document.getElementById('qFeedback');
            fb.textContent = i === q.ans ? q.exp : '? Kurang tepat. ' + q.exp;
            fb.classList.add('show');
            document.getElementById('qNext').style.display = 'inline-block';
            if (current === questions.length - 1) document.getElementById('qNext').textContent = `Lihat Hasil (${score}/${questions.length})`;
        }

        function nextQuestion() {
            current++;
            if (current < questions.length) { renderQuestion(); return; }
            const card = document.getElementById('quizCard');
            card.innerHTML = `
    <div class="quiz-prompt" style="position:relative;z-index:1">Hasil Akhir</div>
    <div class="quiz-q" style="position:relative;z-index:1;font-size:2.5rem">${score >= 4 ? '🔹' : score >= 3 ? '🔹' : '🔹'}</div>
    <div class="quiz-q" style="position:relative;z-index:1">Skor kamu: ${score} / ${questions.length}</div>
    <p style="position:relative;z-index:1;opacity:0.85;font-size:0.9rem">${score === 5 ? 'Sempurna! Kamu siap ke Modul 2.' : score >= 3 ? 'Bagus! Baca ulang sedikit lalu lanjut.' : 'Ayo ulangi materi ini dulu ya.'}</p>
    <button class="quiz-next" style="display:inline-block" onclick="restartQuiz()">Ulangi Quiz</button>
 - `;
        }

        function restartQuiz() {
            current = 0; score = 0;
            document.getElementById('quizCard').innerHTML = `
    <div class="quiz-prompt">Pertanyaan <span id="qNum">1</span> dari <span id="qTotal">5</span></div>
    <div class="quiz-q" id="qText"></div>
    <div class="quiz-options" id="qOptions"></div>
    <div class="quiz-feedback" id="qFeedback"></div>
    <button class="quiz-next" id="qNext" onclick="nextQuestion()">Pertanyaan Berikutnya ?</button>
 - `;
            renderQuestion();
        }

        renderQuestion();
    </script>
</body>

</html>
