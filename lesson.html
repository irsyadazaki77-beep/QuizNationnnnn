                        <button class="item-btn" id="btnTime" onclick="useItem('time')">⏳ +60s (<span

                                id="countFreeze">0</span>)</button>

                    <div class="question-meta">
                        <span class="question-badge" id="questionPositionBadge">Soal 1</span>
                        <span class="question-badge soft" id="totalQuestionsBadge">20 soal</span>
                    </div>

                    <div class="question" id="question"></div>
                    <div class="options" id="options"></div>

                    <div class="nav-buttons">
                        <button class="nav-btn nav-btn-prev" id="prevBtn" onclick="navigateQuestion(-1)">⬅️
                            Sebelumnya</button>
                        <button class="nav-btn nav-btn-next" id="nextBtn" onclick="navigateQuestion(1)">Selanjutnya
                            ➡️</button>
                    </div>
                </div>
            </div>

                    </div>
                    <div class="stat-mini">
                        <span class="mini-label">Status</span>

                    </div>
                </div>

                <div class="nav-panel">
                    <div class="nav-label">🗂️ Navigasi Soal</div>
                    <div class="nav-grid" id="navGrid"></div>

                    <a href="index.html" class="back-link">⬅️ Kembali ke Beranda</a>
